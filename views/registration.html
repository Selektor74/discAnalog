<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Р В Р ВөР С–Р С‘РЎРғРЎвҖҡРЎРӮР В°РЎвҖ Р С‘РЎРҸ</title>
  <link rel="stylesheet" href="/stylesheets/main.css">
</head>
<body>
  <div class="auth-container">
    <h2>Р РҺР С•Р В·Р Т‘Р В°РЎвҖҡРЎРҠ Р В°Р С”Р С”Р В°РЎС“Р Р…РЎвҖҡ</h2>
    <form id="registerForm">
      <div class="form-group">
        <label for="username">Р ВҳР СҳРЎРҸ Р С—Р С•Р В»РЎРҠР В·Р С•Р РҶР В°РЎвҖҡР ВөР В»РЎРҸ</label>
        <input type="text" id="username" placeholder="Р вҖҷР РҶР ВөР Т‘Р С‘РЎвҖҡР Вө Р С‘Р СҳРЎРҸ" required>
      </div>
      <div class="form-group">
        <label for="password">Р СҹР В°РЎРӮР С•Р В»РЎРҠ</label>
        <input type="password" id="password" placeholder="Р вҖҷР РҶР ВөР Т‘Р С‘РЎвҖҡР Вө Р С—Р В°РЎРӮР С•Р В»РЎРҠ" minlength="8" required>
      </div>
      <div class="form-group">
        <label for="confirm-password">Р СҹР С•Р Т‘РЎвҖҡР РҶР ВөРЎРӮР В¶Р Т‘Р ВөР Р…Р С‘Р Вө Р С—Р В°РЎРӮР С•Р В»РЎРҸ</label>
        <input type="password" id="confirm-password" placeholder="Р СҹР С•Р РҶРЎвҖҡР С•РЎРӮР С‘РЎвҖҡР Вө Р С—Р В°РЎРӮР С•Р В»РЎРҠ" minlength="8" required>
      </div>
      <p id="registerError" class="error-text"></p>
      <button type="submit" class="auth-btn" id="registerBtn">Р вҖ”Р В°РЎРӮР ВөР С–Р С‘РЎРғРЎвҖҡРЎРӮР С‘РЎРӮР С•Р РҶР В°РЎвҖҡРЎРҠРЎРғРЎРҸ</button>
    </form>
    <div class="alt-link">
      Р РҲР В¶Р Вө Р ВөРЎРғРЎвҖҡРЎРҠ Р В°Р С”Р С”Р В°РЎС“Р Р…РЎвҖҡ? <a href="/">Р вҖҷР С•Р в„–РЎвҖҡР С‘</a>
    </div>
  </div>
  <script src="/javascript/registration.js"></script>
</body>
</html>
