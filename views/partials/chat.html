<div class="chat-dock">
    <div class="sticker-panel" aria-label="Sound stickers">
        <div class="sticker-panel-title">Stickers</div>
        <button class="sticker-item js-sticker" data-sticker="dacha" type="button" aria-label="Play dacha sticker">
            Dacha
        </button>
    </div>
    <div class="chat-section" id="chat">
        <div class="chat-header">Чат встречи</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="messageInput" placeholder="Сообщение..." maxlength="500">
            <button class="send-btn" id="sendBtn" aria-label="Отправить сообщение">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>
    </div>
</div>
