<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Комнаты</title>
  <link rel="stylesheet" href="/stylesheets/main.css">
</head>
<body>
  <div class="rooms-container">
    <h2 class="rooms-header">Доступные комнаты</h2>
    <div>
      <a href="/" class="join-btn js-logout" data-logout-redirect="/">Выйти</a>
    </div>

    <div class="room-card">
      <div class="form-group">
        <label for="roomNameInput">Название новой комнаты</label>
        <input type="text" id="roomNameInput" placeholder="Например: Вечерний созвон" maxlength="80">
      </div>
      <p id="createRoomError" class="error-text"></p>
      <button class="join-btn" id="createRoomBtn">Создать комнату</button>
    </div>

    <div class="rooms-list"></div>
  </div>

  <script>
    let RoomsList = {{ .RoomsJSON }}
  </script>
  <script src="/javascript/rooms.js"></script>
  <script src="/javascript/logout.js"></script>
</body>
</html>
